
services:
  backend:
    build: .

    container_name: blinkit-backend

    ports:
      - "5000:5000"

    volumes:
      - .:/app
      - /app/node_modules

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17

    container_name: blinkit-postgres

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blinkit

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: blinkit-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data:
